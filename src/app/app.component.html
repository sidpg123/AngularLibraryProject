<nav style="padding: 10px; border-bottom: 1px solid #ccc; display: flex; gap: 15px; align-items: center;">
  
  <!-- Always visible -->
  <a routerLink="/">Home</a>
  <a routerLink="/books">Books</a>

  <!-- Use async pipe once -->
  <ng-container *ngIf="currentUser$ | async as user; else guestLinks">

    <!-- Logged-in links -->
    <a routerLink="/my-books">My Books</a>

    <a *ngIf="user.role === 'librarian'" routerLink="/librarian/dashboard">
      Librarian Dashboard
    </a>
    <a *ngIf="user.role === 'librarian'" routerLink="/librarian/manage-books">
      Manage Books
    </a>
    <a *ngIf="user.role === 'librarian'" routerLink="/librarian/manage-users">
      Manage Users
    </a>

    <span style="margin-left:auto;">
      Welcome, {{ user.fullName }}
    </span>

    <button (click)="logout()">Logout</button>

  </ng-container>

  <!-- Guest links -->
  <ng-template #guestLinks>
    <span style="margin-left:auto;"></span>
    <a routerLink="/auth/login">Login</a>
    <a routerLink="/auth/register">Register</a>
  </ng-template>

</nav>

<!-- Router outlet -->
<router-outlet></router-outlet>
