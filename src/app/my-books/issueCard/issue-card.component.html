<div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">

  <h3>
    {{ issue.book?.title }}

    <span *ngIf="issue.status === 'overdue'"
          style="background:red; color:white; padding:2px 6px; margin-left:10px;">
      OVERDUE
    </span>
  </h3>

  <p>Status: {{ issue.status }}</p>
  <p>Due Date: {{ issue.dueDate | date }}</p>

  <p *ngIf="issue.status !== 'returned'">
    Renewals: {{ issue.renewalCount }} / {{ issue.maxRenewals }}
  </p>

<!-- <div *ngIf="issue.status === 'overdue'"> -->
  <p *ngIf="calculatedFine && calculatedFine.status !== 'returned'"  style="color:red;">
    Fine: ${{ calculatedFine.calculatedFine }}
  </p>
<!-- </div> -->
  <button (click)="onDetailsClick()">Details</button>
</div>
