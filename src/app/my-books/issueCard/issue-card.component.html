<div class="issue-card"
  [class.status-issued]="issue.status === 'issued'"
  [class.status-overdue]="issue.status === 'overdue'"
  [class.status-returned]="issue.status === 'returned'"
  [style.--card-index]="index">

  <!-- Left color stripe -->
  <div class="status-stripe"></div>

  <!-- Card body -->
  <div class="card-body">

    <!-- Book info -->
    <div class="book-info">

      <div class="book-title">
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
          {{ issue.book?.title || 'Unknown Book' }}
        </span>
        <span class="status-pill"
          [class.issued]="issue.status === 'issued'"
          [class.overdue]="issue.status === 'overdue'"
          [class.returned]="issue.status === 'returned'">
          {{ issue.status }}
        </span>
      </div>

      <div class="date-row">
        <div class="date-item">
          <span class="date-label">Due Date</span>
          <span class="date-value" [class.overdue-date]="issue.status === 'overdue'">
            {{ issue.dueDate | date:'MMM d, yyyy' }}
          </span>
        </div>

        <div class="date-sep" *ngIf="issue.returnDate"></div>

        <div class="date-item" *ngIf="issue.returnDate">
          <span class="date-label">Returned</span>
          <span class="date-value">{{ issue.returnDate | date:'MMM d, yyyy' }}</span>
        </div>
      </div>

      <div class="renewal-tag"
        *ngIf="issue.status !== 'returned'"
        [class.maxed]="issue.renewalCount >= issue.maxRenewals">
        Renewals: {{ issue.renewalCount }} / {{ issue.maxRenewals }}
      </div>

    </div>

    <!-- Right: fine + button -->
    <div class="card-right">

      <div class="fine-badge" *ngIf="calculatedFine && issue.status !== 'returned'">
        <span class="fine-label">Fine</span>
        <span class="fine-amount" [class.zero]="calculatedFine.calculatedFine === 0">
          ${{ calculatedFine.calculatedFine }}
        </span>
      </div>

      <button class="btn-details" (click)="onDetailsClick()">
        Details
      </button>

    </div>

  </div>

</div>
